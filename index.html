<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Noodel Workshop Tasks</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
max-width:800px;
margin:auto;
padding:40px;
}

input,button{
padding:10px;
margin:5px;
}

.task{
border:1px solid #ddd;
padding:10px;
margin-top:10px;
border-radius:6px;
}
</style>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";


const firebaseConfig = {
apiKey: "AIzaSyA3Elnmu6pNAsAgkvxdEEJdTYV5bdXzrWE",
authDomain: "workshop-gemeinschafts-we.firebaseapp.com",
projectId: "workshop-gemeinschafts-we",
storageBucket: "workshop-gemeinschafts-we.firebasestorage.app",
messagingSenderId: "118344500587",
appId: "1:118344500587:web:e0cedbfb22c0c8db2ff82e"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


async function addEntry(){

const name=document.getElementById("name").value;
const role=document.getElementById("role").value;
const task=document.getElementById("task").value;

if(!name || !task) return;

await addDoc(collection(db,"tasks"),{
name:name,
role:role,
task:task
});

document.getElementById("name").value="";
document.getElementById("role").value="";
document.getElementById("task").value="";
}


function loadEntries(){

const list=document.getElementById("list");

onSnapshot(collection(db,"tasks"),(snapshot)=>{

list.innerHTML="";

snapshot.forEach(doc=>{

const data=doc.data();

const div=document.createElement("div");
div.className="task";

div.innerHTML=
"<b>"+data.name+"</b>" +
(data.role ? " ("+data.role+")" : "") +
"<br>Task: "+data.task;

list.appendChild(div);

});

});

}

window.addEntry=addEntry;
window.onload=loadEntries;

</script>

</head>

<body>

<h1>Workshop Aufgabenliste</h1>

<p>Trage dich für eine Aufgabe ein.</p>

<input id="name" placeholder="Name">

<input id="role" placeholder="Rolle (optional)">

<input id="task" placeholder="Aufgabe">

<button onclick="addEntry()">Eintragen</button>

<h2>Aktuelle Einträge</h2>

<div id="list"></div>

</body>
</html>
